<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PAC LOGIN</title>


<style>


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{
    height:100vh;
    overflow:hidden;
    background:black;
    font-family:Arial, sans-serif;
}




.maze{
    position:fixed;
    inset:0;


    background:
    repeating-linear-gradient(
        90deg,
        transparent 0px,
        transparent 78px,
        #00aaff 78px,
        #00aaff 82px
    ),


    repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 78px,
        #00aaff 78px,
        #00aaff 82px
    );


    opacity:.35;
}






.dots{
    position:fixed;
    inset:0;


    background-image:
    radial-gradient(yellow 2px, transparent 2px);


    background-size:40px 40px;


    opacity:.8;
}






.panel{


    position:absolute;


    top:50%;
    left:50%;


    transform:translate(-50%,-50%);


    width:420px;


    background:black;


    border:5px solid #00ffff;


    padding:30px;


    box-shadow:
    14px 14px 0px #ff00aa;


    z-index:10;
}






h1{


    text-align:center;


    color:#ffd800;


    letter-spacing:4px;


    margin-bottom:10px;


    text-shadow:
    3px 3px 0px #ff0000;
}


.score{


    text-align:center;


    color:white;


    margin-bottom:20px;
}






.fantasmas{


    display:flex;


    justify-content:center;


    gap:15px;


    margin-bottom:20px;


    font-size:28px;
}


label{
    color:white;
    display:block;
    margin-top:10px;
    margin-bottom:5px;
}


input{


    width:100%;


    padding:12px;


    background:#111;


    color:white;


    border:3px solid #00ffff;
}


input:focus{
    outline:none;
    border-color:#ffd800;
}




button{


    width:100%;


    margin-top:20px;


    padding:14px;


    background:#ffd800;


    border:none;


    font-weight:bold;


    font-size:18px;


    cursor:pointer;


    box-shadow:
    6px 6px 0px red;


    transition:.1s;
}


button:hover{


    transform:translate(2px,2px);


    box-shadow:
    4px 4px 0px red;
}


button:active{


    transform:translate(6px,6px);


    box-shadow:none;
}






.coin{


    text-align:center;


    margin-top:20px;


    color:#ffd800;


    animation:blink .8s infinite;
}


@keyframes blink{


    50%{
        opacity:0;
    }
}




}


</style>
</head>
<body>


<div class="maze"></div>
<div class="dots"></div>






<div class="panel">


    <h1>PAC LOGIN</h1>


    <div class="score">
        HIGH SCORE<br>
        15000
    </div>


    <div class="fantasmas">
        🔴 🩷 🩵 🟠
    </div>


    <label>USUARIO</label>
    <input type="text">


    <label>CONTRASEÑA</label>
    <input type="password">

" target="_blank">










    <button>START GAME</button>
</a>


</div>


</body>
</html>
